<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess Position Builder</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    gap:30px;
    padding:20px;
}

#boardWrapper{
    display:flex;
    gap:12px;
    align-items:flex-start;
}

#rankLabels{
    display:grid;
    grid-template-rows:repeat(8,80px);
    width:30px;
}

.rankLabel{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:bold;
    color:white;
}

#board{
    display:grid;
    grid-template-columns:repeat(8,80px);
    grid-template-rows:repeat(8,80px);
    border:2px solid white;
}

#fileLabels{
    display:grid;
    grid-template-columns:repeat(8,80px);
    height:40px;
    margin-top:6px;
}

.fileLabel{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:bold;
    color:white;
}

.square{
    width:80px;
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:52px;
    cursor:pointer;
    user-select:none;
}

.light{
    background:#f0d9b5;
}

.dark{
    background:#b58863;
}

#side{
    width:320px;
}

.piece{
    font-size:42px;
    cursor:pointer;
    margin:5px;
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:50px;
    height:50px;
    border-radius:8px;
}

.whitePiece{
    color:white;
}

.blackPiece{
    color:black;
    text-shadow:
        0 0 2px white,
        0 0 4px white,
        0 0 6px white;
}

.selected{
    outline:3px solid lime;
}

button{
    margin-top:20px;
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

textarea{
    width:100%;
    height:220px;
    margin-top:20px;
    background:#222;
    color:white;
    border:1px solid #444;
    padding:10px;
    resize:none;
}

h2{
    margin-top:0;
}

.instructions{
    margin-bottom:20px;
    color:#ccc;
    line-height:1.5;
}

</style>
</head>
<body>

<div id="boardWrapper">

    <div id="rankLabels"></div>

    <div>
        <div id="board"></div>
        <div id="fileLabels"></div>
    </div>

</div>

<div id="side">

    <h2>Chess Position Builder</h2>

    <div class="instructions">
        Select a piece, then click a square to place it.<br>
        Click a placed piece to remove it.<br>
        Press Generate Position when finished.
    </div>

    <div id="pieces">

        <!-- White -->

        <div class="piece whitePiece">♔</div>
        <div class="piece whitePiece">♕</div>
        <div class="piece whitePiece">♖</div>
        <div class="piece whitePiece">♗</div>
        <div class="piece whitePiece">♘</div>
        <div class="piece whitePiece">♙</div>

        <br><br>

        <!-- Black -->

        <div class="piece blackPiece">♚</div>
        <div class="piece blackPiece">♛</div>
        <div class="piece blackPiece">♜</div>
        <div class="piece blackPiece">♝</div>
        <div class="piece blackPiece">♞</div>
        <div class="piece blackPiece">♟</div>

    </div>

    <button id="clearBtn">
        Clear Board
    </button>

    <button id="generateBtn">
        Generate Position
    </button>

    <textarea id="output"></textarea>

</div>

<script>

const board = document.getElementById("board");
const rankLabels = document.getElementById("rankLabels");
const fileLabels = document.getElementById("fileLabels");

const files = ["a","b","c","d","e","f","g","h"];

let selectedPiece = "♔";

const pieceMap = {

    "♔":"K",
    "♕":"Q",
    "♖":"R",
    "♗":"B",
    "♘":"N",
    "♙":"P",

    "♚":"k",
    "♛":"q",
    "♜":"r",
    "♝":"b",
    "♞":"n",
    "♟":"p"
};

function isBlackPiece(piece){

    return [
        "♚","♛","♜",
        "♝","♞","♟"
    ].includes(piece);

}

/* Rank labels 8→1 */

for(let rank=8; rank>=1; rank--){

    const label = document.createElement("div");

    label.className = "rankLabel";
    label.textContent = rank;

    rankLabels.appendChild(label);
}

/* File labels a→h */

files.forEach(letter=>{

    const label = document.createElement("div");

    label.className = "fileLabel";
    label.textContent = letter;

    fileLabels.appendChild(label);

});

/* Create board */

for(let rank=8; rank>=1; rank--){

    for(let file=0; file<8; file++){

        const square=document.createElement("div");

        square.classList.add("square");

        if((rank+file)%2===0){
            square.classList.add("light");
        }else{
            square.classList.add("dark");
        }

        square.dataset.square =
            files[file] + rank;

        square.addEventListener("click",()=>{

            /* Remove piece if occupied */

            if(square.textContent){

                square.textContent="";
                square.style.color="";
                square.style.textShadow="";
                return;
            }

            square.textContent = selectedPiece;

            if(isBlackPiece(selectedPiece)){

                square.style.color="black";

                square.style.textShadow=
                    "0 0 2px white, 0 0 4px white, 0 0 6px white";

            }else{

                square.style.color="white";
                square.style.textShadow="none";

            }

        });

        board.appendChild(square);

    }
}

document.querySelectorAll(".piece").forEach(piece=>{

    piece.addEventListener("click",()=>{

        document
        .querySelectorAll(".piece")
        .forEach(p=>p.classList.remove("selected"));

        piece.classList.add("selected");

        selectedPiece = piece.textContent;

    });

});

document.querySelector(".piece").classList.add("selected");

document
.getElementById("clearBtn")
.addEventListener("click",()=>{

    document
    .querySelectorAll(".square")
    .forEach(square=>{

        square.textContent="";
        square.style.color="";
        square.style.textShadow="";

    });

    document.getElementById("output").value="";

});

document
.getElementById("generateBtn")
.addEventListener("click",()=>{

    let white=[];
    let black=[];

    document
    .querySelectorAll(".square")
    .forEach(square=>{

        const piece=square.textContent;

        if(!piece) return;

        const code=pieceMap[piece];
        const pos=square.dataset.square;

        if(code===code.toUpperCase()){

            white.push(code + pos);

        }else{

            black.push(code.toUpperCase() + pos);

        }

    });c

    document.getElementById("output").value =
`White: ${white.join(" ")}

Black: ${black.join(" ")}`;

});

</script>

</body>
</html>
