<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Helps minimize Safari UI appearance -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<title>DAN DALE - LUX ARCHITECTURAL PRODUCTS</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html, body{
        width:100%;
        height:100%;
        overflow:hidden;
        font-family:Arial, Helvetica, sans-serif;
        background:black;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
    }

    video{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        object-fit:cover;
    }

    #introVideo{
        z-index:10;
        background:black;
    }

    #bgVideo{
        z-index:1;
        opacity:0;
        transition:opacity 1.5s ease;
    }

    .overlay{
        position:relative;
        z-index:5;
        width:100%;
        max-width:500px;
        padding:30px;
        text-align:center;

        opacity:0;
        transform:translateY(30px);

        transition:
            opacity 1.2s ease,
            transform 1.2s ease;
    }

    .overlay.show{
        opacity:1;
        transform:translateY(0);
    }

    .logo{
        width:240px;
        max-width:80%;
        margin-bottom:35px;

        opacity:0;
        transform:scale(0.92);

        transition:
            opacity 1s ease,
            transform 1s ease;

        transition-delay:0.2s;
    }

    .overlay.show .logo{
        opacity:1;
        transform:scale(1);
    }

    .name{
        font-size:2rem;
        margin-bottom:15px;
        letter-spacing:0.5px;

        opacity:0;
        transform:translateY(15px);

        transition:
            opacity 1s ease,
            transform 1s ease;

        transition-delay:0.5s;
    }

    .overlay.show .name{
        opacity:1;
        transform:translateY(0);
    }

    .name strong{
        font-weight:800;
    }

    .details{
        font-size:1rem;
        line-height:1.8;
        margin-bottom:35px;

        opacity:0;
        transform:translateY(15px);

        transition:
            opacity 1s ease,
            transform 1s ease;

        transition-delay:0.8s;
    }

    .overlay.show .details{
        opacity:1;
        transform:translateY(0);
    }

    .phone{
        color:white;
    }

    .email{
        color:white;
    }

    .button{
        display:inline-block;
        padding:14px 28px;

        border:1px solid rgba(255,255,255,0.5);
        border-radius:40px;

        color:white;
        text-decoration:none;
        font-size:1rem;

        backdrop-filter:blur(8px);
        background:rgba(255,255,255,0.08);

        transition:
            transform 0.3s ease,
            background 0.3s ease,
            border-color 0.3s ease,
            opacity 1s ease;

        opacity:0;
        transform:translateY(15px);

        transition-delay:1.1s;

        cursor:pointer;
    }

    .overlay.show .button{
        opacity:1;
        transform:translateY(0);
    }

    .button:hover{
        background:rgba(255,255,255,0.16);
        border-color:rgba(255,255,255,0.9);
        transform:scale(1.04);
    }

    @media (max-width:600px){

        .name{
            font-size:1.7rem;
        }

        .details{
            font-size:0.95rem;
        }

        .logo{
            width:200px;
        }
    }

</style>
</head>

<body>

<!-- INTRO VIDEO -->
<video id="introVideo" autoplay muted playsinline>
    <source src="logo 01.mp4" type="video/mp4">
</video>

<!-- LOOPING BACKGROUND VIDEO -->
<video id="bgVideo" autoplay muted loop playsinline>
    <source src="LOADING_BG.mp4" type="video/mp4">
</video>

<!-- CONTENT -->
<div class="overlay" id="overlay">

    <img src="logo_2.png" alt="Company Logo" class="logo">

    <div class="name">
        <strong>DAN</strong> DALE
    </div>

    <div class="details">
        <div class="phone">780 897-8550</div>
        <div class="email">dan@luxarpro.com</div>
    </div>

    <a class="button" id="downloadContact">
        Download Contact
    </a>

</div>

<script>

    const introVideo = document.getElementById('introVideo');
    const bgVideo = document.getElementById('bgVideo');
    const overlay = document.getElementById('overlay');

    // Fake tiny scroll to minimize Safari UI
    window.addEventListener('load', () => {

        setTimeout(() => {
            window.scrollTo(0, 1);
        }, 500);

    });

    // Intro video finished
    introVideo.addEventListener('ended', () => {

        // Fade in background video
        bgVideo.style.opacity = '1';

        // Fade out intro
        introVideo.style.transition = 'opacity 1s ease';
        introVideo.style.opacity = '0';

        // Remove intro after fade
        setTimeout(() => {
            introVideo.style.display = 'none';
        }, 1000);

        // Show overlay content
        setTimeout(() => {
            overlay.classList.add('show');
        }, 400);

    });

    // Convert image to Base64
    async function getBase64Image(url){

        const response = await fetch(url);
        const blob = await response.blob();

        return new Promise((resolve) => {

            const reader = new FileReader();

            reader.onloadend = () => {

                const base64data = reader.result.split(',')[1];
                resolve(base64data);

            };

            reader.readAsDataURL(blob);

        });
    }

    // Download contact
    document.getElementById('downloadContact').addEventListener('click', async () => {

        const base64Logo = await getBase64Image('logo_2.png');

        const vCardData =
`BEGIN:VCARD
VERSION:3.0
N:Dale;Dan;;;
FN:Dan Dale
ORG:Lux Architectural Products
TITLE:LUX ARCHITECTURAL PRODUCTS
TEL;TYPE=CELL:7808978550
EMAIL;TYPE=INTERNET:dan@luxarpro.com
PHOTO;ENCODING=b;TYPE=PNG:${base64Logo}
END:VCARD`;

        const blob = new Blob(
            [vCardData],
            { type: 'text/vcard;charset=utf-8' }
        );

        const url = window.URL.createObjectURL(blob);

        const a = document.createElement('a');

        a.href = url;
        a.download = 'Dan_Dale.vcf';

        document.body.appendChild(a);

        a.click();

        document.body.removeChild(a);

        window.URL.revokeObjectURL(url);

    });

</script>

</body>
</html>
